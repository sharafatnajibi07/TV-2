<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="refresh" content="60">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Visitor Schedule</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #fff;
      background-image: url('https://citywideps.com/assets/backgrounds/desktopbg-xl3.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.68);
      min-height: 100vh;
      padding: 20px 0 40px 0;
    }

    .brand-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
      margin-bottom: 20px;
    }

    .brand-left {
      font-size: 34px;
      font-weight: bold;
      color: #ffffff;
    }

    .brand-right {
      font-size: 28px;
      color: #dddddd;
    }

    h1 {
      text-align: center;
      font-size: 96px;
      margin: 10px 0;
      letter-spacing: 2px;
    }

    .today {
      text-align: center;
      font-size: 46px;
      background: #ffeb3b;
      color: #000;
      padding: 14px;
      font-weight: bold;
      margin: 10px auto 30px auto;
      width: 72%;
      border-radius: 14px;
    }

    .events-container {
      width: 100%;
    }

    .event {
      width: 84%;
      margin: 24px auto;
      padding: 30px 40px;
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.76);
      border: 2px solid rgba(255,255,255,0.12);
    }

    .current {
      border: 4px solid #00e676;
      box-shadow: 0 0 20px rgba(0, 230, 118, 0.7);
      background: rgba(0, 80, 40, 0.82);
    }

    .time {
      font-size: 56px;
      font-weight: bold;
    }

    .title {
      font-size: 76px;
      margin-top: 10px;
      font-weight: 700;
      line-height: 1.05;
    }

    .location {
      font-size: 38px;
      margin-top: 12px;
      color: #e0e0e0;
    }

    .notes {
      font-size: 32px;
      margin-top: 10px;
      color: #cfcfcf;
    }

    .empty {
      text-align: center;
      font-size: 60px;
      margin-top: 120px;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="overlay">

    <div class="brand-bar">
      <div class="brand-left">CITYWIDE PROPERTY SERVICES</div>
      <div class="brand-right">1:22 PM PST</div>
    </div>

    <h1>Visitor Schedule</h1>

    <div class="today">
      TODAY - Thursday, April 23, 2026
    </div>

    <div class="events-container">
      <div class="event ">

  <div class="time">
    12:00 PM
    -
    12:30 PM
  </div>

  <div class="title">
    Test
  </div>

  <div class="location">
    Visitor Log
  </div>

  <div class="notes">
    
  </div>

</div>
    </div>

  </div>
</body>
</html>
