<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="refresh" content="300">
  <title>Visitor Schedule</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
    }
    h1 {
      text-align: center;
      font-size: 56px;
      margin: 20px 0 10px 0;
    }
    .today {
      text-align: center;
      font-size: 30px;
      background: #ffeb3b;
      color: #000;
      padding: 12px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    .event {
      width: 90%;
      margin: 20px auto;
      padding: 20px;
      border: 1px solid #444;
      border-radius: 12px;
      background: #111;
    }
    .time {
      font-size: 34px;
      font-weight: bold;
    }
    .title {
      font-size: 42px;
      margin-top: 8px;
    }
    .location, .notes {
      font-size: 26px;
      margin-top: 8px;
      color: #ddd;
    }
    .empty {
      text-align: center;
      font-size: 36px;
      margin-top: 80px;
      color: #bbb;
    }
  </style>
</head>
<body>
  <h1>Visitor Schedule</h1>
  <div class="today">TODAY - Thursday, April 23, 2026</div>
  <div class="empty">No events scheduled today</div>
</body>
</html>
