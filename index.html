<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="refresh" content="300">
  <title>Visitor Schedule</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #fff;

      background-image: url('https://citywideps.com/assets/backgrounds/desktopbg-xl3.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.65);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    h1 {
      text-align: center;
      font-size: 100px;
      margin: 10px 0;
    }

    .today {
      text-align: center;
      font-size: 48px;
      background: #ffeb3b;
      color: #000;
      padding: 14px;
      font-weight: bold;
      margin: 10px auto 30px auto;
      width: 70%;
      border-radius: 12px;
    }

    .event {
      width: 85%;
      margin: 25px auto;
      padding: 30px 40px;
      border-radius: 16px;
      background: rgba(0,0,0,0.75);
    }

    .time {
      font-size: 60px;
      font-weight: bold;
    }

    .title {
      font-size: 80px;
      margin-top: 10px;
    }

    .location {
      font-size: 42px;
      margin-top: 10px;
      color: #ddd;
    }

    .notes {
      font-size: 36px;
      margin-top: 8px;
      color: #bbb;
    }

    .empty {
      text-align: center;
      font-size: 60px;
      margin-top: 120px;
    }
  </style>
</head>

<body>
  <div class="overlay">

    <h1>Visitor Schedule</h1>

    <div class="today">
      TODAY - Thursday, April 23, 2026
    </div>

    <div class="empty">No events scheduled today</div>

  </div>
</body>
</html>
