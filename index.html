<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="refresh" content="60">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>Visitor Schedule</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #fff;
      background-image: url('https://citywideps.com/assets/backgrounds/desktopbg-xl3.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.65);
      min-height: 100vh;
      padding: 14px 0 25px 0;
    }

    .brand-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
      margin-bottom: 10px;
    }

    .brand-left {
      font-size: 32px;
      font-weight: bold;
    }

    .brand-right {
      font-size: 26px;
      color: #dddddd;
    }

    h1 {
      text-align: center;
      font-size: 80px;
      margin: 5px 0;
      letter-spacing: 1px;
    }

    .today {
      text-align: center;
      font-size: 38px;
      background: #ffeb3b;
      color: #000;
      padding: 12px;
      font-weight: bold;
      margin: 8px auto 18px auto;
      width: 60%;
      border-radius: 10px;
    }

    /* ✅ GRID LAYOUT */
    .events-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      width: 94%;
      margin: 0 auto;
    }

    .event {
      padding: 25px 35px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.78);
      border: 2px solid rgba(255,255,255,0.12);
    }

    /* ✅ CURRENT EVENT HIGHLIGHT */
    .current {
      border: 4px solid #00ff9c;
      box-shadow: 0 0 24px rgba(0, 255, 156, 0.85);
      background: rgba(0, 80, 40, 0.85);
    }

    .time {
      font-size: 48px;
      font-weight: bold;
    }

    .title {
      font-size: 60px;
      margin-top: 6px;
      font-weight: 700;
      line-height: 1.05;
    }

    .location {
      font-size: 32px;
      margin-top: 8px;
      color: #e0e0e0;
    }

    .notes {
      font-size: 26px;
      margin-top: 6px;
      color: #cfcfcf;
    }

    .attendees {
      font-size: 24px;
      margin-top: 6px;
      color: #8fd3ff;
    }

    .empty {
      text-align: center;
      font-size: 50px;
      margin-top: 100px;
      color: #fff;
      grid-column: span 2;
    }

    /* OPTIONAL: stack on smaller screens */
    @media (max-width: 1200px) {
      .events-container {
        grid-template-columns: 1fr;
      }
    }

  </style>
</head>

<body>
  <div class="overlay">

    <div class="brand-bar">
      <div class="brand-left">CITYWIDE PROPERTY SERVICES</div>
      <div class="brand-right">
        12:52 AM PST
      </div>
    </div>

    <h1>Visitor Schedule</h1>

    <div class="today">
      TODAY - Wednesday, May 6, 2026
    </div>

    <div class="events-container">
      <div class="event ">

  <div class="time">
    10:00 AM
    -
    10:30 AM
  </div>

  <div class="title">
    Jess Becerril - DP - SAC/Antelope
  </div>

  <div class="attendees">
    Attendees: jose.cuellar@citywideps.com
  </div>

</div><div class="event ">

  <div class="time">
    11:00 AM
    -
    11:30 AM
  </div>

  <div class="title">
    Day Porter - Roseville
  </div>

  <div class="attendees">
    Attendees: jose.cuellar@citywideps.com
  </div>

</div>
    </div>

  </div>
</body>
</html>
